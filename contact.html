<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

body{
background:#0b0b0b;

}

nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    padding:15px;

nav a{
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
}

nav a:hover{
    color:#D4AF37;
}

nav a.active{
    color:#D4AF37;
    border-bottom:2px solid #D4AF37;
    padding-bottom:5px;
}
.hero{
padding:140px 20px 100px;
text-align:center;
background:
linear-gradient(
rgba(0,0,0,0.7),
rgba(0,0,0,0.7)
),
url("wallpaper.jpg");

background-size:cover;
background-position:center;
}

.logo{
width:250px;
max-width:90%;
display:block;
margin:0 auto 20px;
}

.hero h1{
color:#D4AF37;
font-size:50px;
font-family:'Playfair Display',serif;
}

.content{
max-width:800px;
margin:auto;
padding:60px 20px;
text-align:center;
}
form{
display:flex;
flex-direction:column;
gap:15px;
margin-top:30px;
}

input,
textarea{
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
background:#D4AF37;
color:black;
border:none;
padding:15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 5px 15px rgba(212,175,55,0.4);
}
footer{
background:#111827;
text-align:center;
padding:20px;
color:#999;

Ready to transform your space?

curtains, and wall graphics.
